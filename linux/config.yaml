# Linux Configuration

paths:
  input_folder: "data/input_imu"
  output_folder: "data/processed_xsens"
  output_filename: "kinematics_v3.sto"
  mapping_file: "sensor_mapping.json"
  model_path: "models/Rajagopal_WithMuscles.osim"
  geometry_path: "models/Geometry"

settings:
  sampling_rate: 60.0

opensim_settings:
  base_imu_label: "pelvis_imu"
  base_heading_axis: "z"
  sensor_to_opensim_rot: [-1.57079633, 0, 0] # -pi/2 on X axis
  output_model_name: "calibrated_model.osim"
